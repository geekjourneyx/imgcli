name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: test "${GITHUB_REF_NAME#v}" = "$(make version)"
      - run: make release-check
      - run: mkdir -p dist
      - run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-X github.com/geekjourneyx/imgcli/pkg/version.Version=${VERSION}" \
            -o dist/imgcli-${{ matrix.goos }}-${{ matrix.goarch }} .
      - uses: actions/upload-artifact@v4
        with:
          name: imgcli_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/imgcli-${{ matrix.goos }}-${{ matrix.goarch }}
  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: |
          cd dist
          sha256sum imgcli-* > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/imgcli-*
            dist/SHA256SUMS
